<!DOCTYPE html>
<html lang="es">
<head>
    <!--Meta Tags -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Style sheets-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    <link rel="icon" type="image/png" href="../img/Logo Renovado - UX.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link href="../css/recursos.css" rel="stylesheet" >
    <link href="../css/contact.css" rel="stylesheet" >
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    
    <!--Sheet's Title-->
    <title>Contacto - PholapSC</title>
</head>
<body>
  <div id="nav-placeholder" class="container"></div>

  <div id="body" class="container pt-4">
      
      <!-- Contact Hero -->
      <section class="contact-hero">
          <div class="container text-center">
              <h1>Trabajemos Juntos</h1>
              <p>Estamos aquí para capturar la esencia de tus mejores momentos.</p>
          </div>
      </section>

      <!-- Contact Section -->
      <section class="contact-section container">
          <div class="row g-5">
              
              <!-- Left side: Contact Information -->
              <div class="col-lg-5">
                  <div class="contact-info-box">
                      <h3 class="contact-info-title">Ponte en contacto</h3>
                      
                      <!-- WhatsApp -->
                      <div class="contact-detail">
                          <i class="bi bi-whatsapp contact-icon"></i>
                          <div class="contact-text-wrapper">
                              <span class="contact-label">WhatsApp / Teléfono</span>
                              <a href="https://wa.me/593963861292" target="_blank" class="contact-text">+593 96 386 1292</a>
                          </div>
                      </div>

                      <!-- Email -->
                      <div class="contact-detail">
                          <i class="bi bi-envelope contact-icon"></i>
                          <div class="contact-text-wrapper">
                              <span class="contact-label">Correo Electrónico</span>
                              <a href="mailto:pholapsc@outlook.com" class="contact-text">pholapsc@outlook.com</a>
                          </div>
                      </div>

                      <!-- Location -->
                      <div class="contact-detail">
                          <i class="bi bi-geo-alt contact-icon"></i>
                          <div class="contact-text-wrapper">
                              <span class="contact-label">Ubicación</span>
                              <span class="contact-text">Quito, Ecuador</span>
                          </div>
                      </div>

                      <!-- Social Media -->
                      <div class="contact-detail mt-5">
                          <i class="bi bi-instagram contact-icon"></i>
                          <div class="contact-text-wrapper">
                              <span class="contact-label">Nuestras Redes</span>
                              <a href="https://instagram.com/pholapSC" target="_blank" class="contact-text">@pholapSC</a>
                          </div>
                      </div>

                      <!-- Imagen Emocional Decorativa -->
                      <div class="mt-5 text-center" style="opacity: 0.8;">
                          <img src="../img/portfolio/Bodas/DSC_1155.webp" alt="PholapSC" style="width: 100%; border-radius: 15px; height: 180px; object-fit: cover;">
                      </div>

                  </div>
              </div>

              <!-- Right side: Contact Form -->
              <div class="col-lg-7">
                  <div class="contact-form-wrapper">
                      <h3 class="form-title">Envíanos un mensaje</h3>
                      <form id="contactForm">
                          <div class="row g-4">
                              <!-- Nombre -->
                              <div class="col-md-6">
                                  <label for="nombre" class="form-label">Nombre Completo</label>
                                  <input type="text" class="form-control" id="nombre" name="Nombre" placeholder="Tu nombre" required>
                              </div>
                              
                              <!-- Teléfono -->
                              <div class="col-md-6">
                                  <label for="telefono" class="form-label">Teléfono / Celular</label>
                                  <input type="tel" class="form-control" id="telefono" name="Telefono" placeholder="+593 99 999 9999" required>
                              </div>

                              <!-- Correo -->
                              <div class="col-12">
                                  <label for="email" class="form-label">Correo Electrónico</label>
                                  <input type="email" class="form-control" id="email" name="Email" placeholder="tucorreo@ejemplo.com" required>
                              </div>

                              <!-- Tipo de Evento -->
                              <div class="col-md-6">
                                  <label for="servicio" class="form-label">Servicio de Interés</label>
                                  <select class="form-select" id="servicio" name="Servicio">
                                      <option selected>Elige un servicio...</option>
                                      <option value="Bodas">Bodas</option>
                                      <option value="Retratos">Retratos</option>
                                      <option value="Eventos">Eventos</option>
                                      <option value="Sesiones Personales">Sesiones Personales</option>
                                      <option value="Familiares">Familiares</option>
                                      <option value="En Estudio">En Estudio</option>
                                      <option value="Naturaleza / Otros">Naturaleza / Otros</option>
                                  </select>
                              </div>

                              <!-- Fecha Estimada -->
                              <div class="col-md-6">
                                  <label for="fecha" class="form-label">Fecha del Evento (Aprox)</label>
                                  <input type="date" class="form-control" id="fecha" name="Fecha">
                              </div>

                              <!-- Mensaje -->
                              <div class="col-12">
                                  <label for="mensaje" class="form-label">Cuéntanos sobre tu idea</label>
                                  <textarea class="form-control" id="mensaje" name="Mensaje" rows="5" placeholder="¿Dónde será? ¿Qué estilo buscas? Detalles importantes..." required></textarea>
                              </div>

                              <!-- Submit -->
                              <div class="col-12 text-end mt-4">
                                  <button type="submit" class="btn btn-submit">Enviar Solicitud</button>
                              </div>
                          </div>
                      </form>
                  </div>
              </div>

          </div>
      </section>

  </div>
  
  <div id="footer-placeholder"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>
  <script>var basePath = '../';</script>
  <script src="../js/main.js"></script>
  <script src="../js/contact.js"></script>

</body>
</html>
