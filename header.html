<script>
  function filename() {
    var path = self.location.pathname;
    // Clean URLs: detect folder name
    var parts = path.split('/').filter(function(p) { return p; });
    var lastPart = parts[parts.length - 1] || '';
    return lastPart;
  }

  var nombre_archivo = filename();

  // Marcar como activo el enlace correspondiente a la página actual
  if (nombre_archivo == "index.html" || nombre_archivo == "" || nombre_archivo == "App-Web") {
    document.getElementById("index").className += " active";
  } else if (nombre_archivo == "services") {
    document.getElementById("services").className += " active";
  } else if (nombre_archivo == "galery") {
    document.getElementById("galery").className += " active";
  } else if (nombre_archivo == "about") {
    document.getElementById("about").className += " active";
  } else if (nombre_archivo == "contact") {
    document.getElementById("contact").className += " active";
  }
</script>
